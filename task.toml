artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task is straightforward log parsing, but requires careful alignment of the prompt, artifact path, oracle output, and verifier assertions."
solution_explanation = "Read /app/access.log, count non-empty log records, count distinct client IP addresses, count request paths, and write the most frequent path to /app/report.json as JSON."
verification_explanation = "The verifier parses /app/report.json and asserts the exact JSON schema and expected values for total request count, unique IP count, and top path."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
